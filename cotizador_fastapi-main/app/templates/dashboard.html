<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión y Cotización Pro (v2026.1)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #000080;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #000080;
            border-bottom: 2px solid #000080;
            padding-bottom: 10px;
        }
        .data-card {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            background: #eef2f5;
        }
        .label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Sistema de Gestión y Cotización Pro (v2026.1)</h1>
    </header>
    <div class="container">
        <h2>Dashboard</h2>
        <div class="data-card">
            <span class="label">Nombre:</span>
            <span>{{ cliente.nombre }}</span>
        </div>
        <div class="data-card">
            <span class="label">Saldo:</span>
            <span>${{ cliente.saldo }}</span>
        </div>
        <div class="data-card">
            <span class="label">Cotizaciones (C):</span>
            <span>{{ cliente.cotizaciones }}</span>
        </div>
    </div>
</body>
</html>
