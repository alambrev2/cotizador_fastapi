<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso No Autorizado - Cotizador Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #000080;
            --danger: #ff4d6d;
            --bg: #0a0a1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: #f0f0f0;
        }
        .container {
            max-width: 100%;
            width: 100%;
            padding: 40px 20px;
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(255, 77, 109, 0.1);
            border: 2px solid rgba(255, 77, 109, 0.3);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.3); }
            50% { box-shadow: 0 0 0 16px rgba(255, 77, 109, 0); }
        }
        .icon-wrapper i { font-size: 36px; color: var(--danger); }
        h1 { font-size: clamp(1.5rem, 5vw, 28px); font-weight: 700; margin-bottom: 12px; word-wrap: break-word; overflow-wrap: break-word; }
        p { color: rgba(255,255,255,0.55); font-size: 14px; line-height: 1.6; margin-bottom: 32px; word-wrap: break-word; }
        .btn-back {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #000080, #1a1aad);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,128,0.4); }
        .error-code {
            font-size: clamp(60px, 15vw, 100px);
            font-weight: 800;
            color: rgba(255,77,109,0.08);
            letter-spacing: -4px;
            line-height: 1;
            margin-bottom: 16px;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">403</div>
        <div class="icon-wrapper">
            <i class="bi bi-shield-x-fill"></i>
        </div>
        <h1>Acceso No Autorizado</h1>
        <p>No tienes los permisos necesarios para acceder a esta sección.<br>
        Si crees que es un error, contacta al administrador del sistema.</p>
        <a href="/dashboard" class="btn-back">
            <i class="bi bi-arrow-left me-1"></i> Volver al Inicio
        </a>
    </div>
</body>
</html>
