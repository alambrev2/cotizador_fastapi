<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cotizador Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #000080;
            --primary-light: #1a1aad;
            --primary-glow: rgba(0, 0, 128, 0.3);
            --bg: #0a0a1a;
            --card-bg: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --text: #f0f0f0;
            --text-muted: rgba(255,255,255,0.5);
            --danger: #ff4d6d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Fondo animado */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 30%, rgba(0,0,128,0.25) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(26,26,173,0.2) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.05) rotate(2deg); }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .login-logo .logo-icon i {
            font-size: 28px;
            color: white;
        }

        .login-logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .login-logo p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.2s;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary-light);
            background: rgba(0,0,128,0.1);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        input[type="text"]:focus + i,
        input[type="password"]:focus + i {
            color: var(--primary-light);
        }

        input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px var(--primary-glow);
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: inline-block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error-msg {
            display: none;
            background: rgba(255, 77, 109, 0.12);
            border: 1px solid rgba(255, 77, 109, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--danger);
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .roles-hint {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .role-badge {
            text-align: center;
            padding: 8px 4px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
        }

        .role-badge .role-icon { font-size: 18px; margin-bottom: 4px; }
        .role-badge .role-name {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h1>Smart Site Company</h1>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" required placeholder="Ej: admin" autofocus>
                        <i class="bi bi-person-fill"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                        <i class="bi bi-lock-fill"></i>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="btn-submit">
                    <span class="btn-text">Ingresar</span>
                    <div class="spinner"></div>
                </button>
                <div id="error-msg"></div>
            </form>

            <!-- Indicador de roles disponibles -->
            <div class="roles-hint">
                <div class="role-badge">
                    <div class="role-icon">🛡️</div>
                    <div class="role-name">Admin</div>
                </div>
                <div class="role-badge">
                    <div class="role-icon">⚙️</div>
                    <div class="role-name">Operativo</div>
                </div>
                <div class="role-badge">
                    <div class="role-icon">👤</div>
                    <div class="role-name">Cliente</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ROLE_REDIRECTS = {
            'Administrador': '/dashboard',
            'Operativo': '/dashboard',
            'Cliente': '/client-dashboard',
        };

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const errorDiv = document.getElementById('error-msg');

            // Estado de carga
            btn.classList.add('loading');
            btn.disabled = true;
            errorDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('username', document.getElementById('username').value.trim());
            formData.append('password', document.getElementById('password').value);
            
            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const role = data.role || 'Administrador';
                    const redirectUrl = ROLE_REDIRECTS[role] || '/dashboard';
                    window.location.href = redirectUrl;
                } else {
                    const errData = await response.json().catch(() => ({}));
                    errorDiv.textContent = errData.detail || 'Usuario o contraseña incorrectos';
                    errorDiv.style.display = 'block';
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
                errorDiv.style.display = 'block';
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
